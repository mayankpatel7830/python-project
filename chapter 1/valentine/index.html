<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Valentine ❤️</title>

<style>
* {
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(rgba(255,192,203,0.28),rgba(255,192,203,0.28)),
  url("kamilla.jpg");
  background-size: cover ;
  background-position:center;
  background-repeat: no-repeat;


  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  position: relative;
  width: 90%;
  max-width: 420px;
  padding: 40px 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(8px);
  text-align: center;
  overflow: hidden;
}

h1 {
  color: #ff5fa2;
}

p {
  color: #555;
  margin-bottom: 35px;
}

.buttons {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin-top: 30px;
  height: 120px;
  position: relative;

}

button {
  border: none;
  border-radius: 999px;
  padding: 14px 30px;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.45s ease;
}

/* YES */
#yes {
  background: #ff6fae;
  color: white;
  padding: 14px 30px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  transition: 0.4s ease;
}

/* NO */
#no {
  background: #eaeaea;
  color: #555;
  padding: 14px 30px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  transition: 0.4s ease;  
}

/* Heartbeat */
.heartbeat {
  animation: beat 1s infinite;
}


.message-box {
  margin: 20px auto;
  padding: 10px 20px;
  background: white;
  color: #555;
  border-radius: 30px;
  width: fit-content;
  font-size: 14px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  min-height: 20px;
  transition: 0.3s;
}
@keyframes beat {
  0% { transform: translate(-50%, -50%) scale(1.6); }
  50% { transform: translate(-50%, -50%) scale(1.8); }
  100% { transform: translate(-50%, -50%) scale(1.6); }
}
</style>
</head>

<body>

<div class="card" id="card">
  <h1>Will you be my Valentine,Kamilla? ❤️</h1>
  <p>Official invite from your long-distance friend 💌</p>

  <div id="messageBox" class="message-box"></div>

  <div class="buttons" id="box">
    <button id="yes">YES! 💖</button>
    <button id="no">No 😢</button>
  </div>
</div>

<script>
window.onload = function () {
const messageBOX = document.getElementById("messageBox");

const messages = [
  "Wait… are you sure? 🥺",
    "No? Try again 😒",
    "Still no? 😢",
    "Last chance 💔"
];

noBtn.addEventListener("click", function () {

if (click < 4) {
  messageBOX.innerText = messages[clicks];
}

clicks++;

if(click === 4) {
  noBtn.style.opacity = "0" ;
  noBtn.style.pointerEvents ="none";

  yesBtn.classList.add("heartbeat");
}
});

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const box = document.querySelector(".buttons");

let clicks = 0;
let scale = 1;

noBtn.addEventListener("click" , function () {

if (clicks === 0)  {
  noBtn.style.position = "absolute";
}

/* 4 CORNERS INSIDE BUTTON BOX */
const corners = [
  { x: 10, y: 10 }, // top-left
  { x: box.clientWidth - 90, y: 10 }, // top-right
  { x: 10, y: box.clientHeight - 60 }, // bottom-left
  { x: box.clientWidth - 90, y: box.clientHeight - 60 } // bottom-right
];

  if (clicks < 4) {
  noBtn.style.left = corners[clicks].x + "px";
  noBtn.style.top = corners[clicks].y + "px";

  // Grow + center YES
  scale += 0.2;
  yesBtn.style.transform = "scale(" + scale + ")" ;

  clicks++;
  }

  // Final state
  if (clicks === 4) {
    noBtn.style.opacity = "0";
    noBtn.style.pointerEvents = "none";

    yesBtn.style.position = "absolute";
    yesBtn.style.left = "50%";
    yesBtn.style.top = "50%";
    yesBtn.style.transform = "translate(-50%, -50%) scale(1.6)";

    yesBtn.classList.add("heartbeat");
  }
});

};
</script>

</body>
</html>
